<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add User UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Form -->
    <div class="form-card">
      <h2>Add User</h2>

      <input type="text" placeholder="Name">
      <input type="text" placeholder="Role">
      <textarea placeholder="Bio"></textarea>
      <input type="text" placeholder="Photo URL">

      <button>Submit</button>
    </div>

    <!-- User Cards -->
    <div class="cards">

      <div class="card">
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
        <h3>John Doe</h3>
        <p class="role">Frontend Developer</p>
        <p>Loves building beautiful UIs and learning new technologies.</p>
      </div>

      <div class="card">
        <img src="https://randomuser.me/api/portraits/women/44.jpg">
        <h3>Jane Smith</h3>
        <p class="role">Backend Engineer</p>
        <p>Enjoys solving complex problems and optimizing APIs.</p>
      </div>

      <div class="card">
        <img src="https://randomuser.me/api/portraits/men/76.jpg">
        <h3>Alex Lee</h3>
        <p class="role">UI/UX Designer</p>
        <p>Passionate about user experience and clean design.</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
