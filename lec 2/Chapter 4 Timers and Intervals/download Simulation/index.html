<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .progress-box {
            width: 100%;
            height: 25px;
            background: #334155;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.2s;
        }

        .percent {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .complete {
            color: #22c55e;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Download File</h2>

    <div class="progress-box">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <button onclick="startDownload()">Start Download</button>

    <div class="complete" id="completeMsg"></div>
</div>

<script src="script.js"></script>

</body>
</html>
